syntax = "proto3";

import "google/protobuf/empty.proto";

package user;

option go_package = "github.com/aleksandrborohovsky/chat_project_proto/user";

service User {
    // Register registers a new user
    rpc Register (RegisterRequest) returns (RegisterResponse);
    // Login logs in a user and returns auth token
    rpc Login (LoginRequest) returns (LoginResponse);
    //Logout logs out a user 
    rpc Logout (LogoutRequest) returns (google.protobuf.Empty);
}


message RegisterRequest {
    string email = 1; // Email of the user to register.
    string password = 2; // Password of the user to register.
}

message RegisterResponse {
    int64 user_id = 1; // ID of the registered user.
}

message LoginRequest {
    string email = 1; // Email of the user to log in.
    string password = 2; // Password of the user to log in.
}

message LoginResponse {
    string token = 1; // Auth token of the logged in user.
}

message LogoutRequest {
    string token = 1; // Auth token of the user to logout.
}

message LogoutResponse {
    bool success = 1; // Indicates whether the logout was successful.
}