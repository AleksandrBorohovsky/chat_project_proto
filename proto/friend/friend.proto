syntax = "proto3";

import "google/protobuf/empty.proto";

package user;

option go_package = "github.com/aleksandrborohovsky/chat_project_proto/friend";

service Friend {
    // Add add new friend to friend list
    rpc AddFriend(AddFriendRequest) returns (google.protobuf.Empty);
    // Add delete friend from friend list
    rpc DeleteFriend(DeleteFriendRequest) returns (google.protobuf.Empty);
    // Get all users friends
    rpc GetFriends(google.protobuf.Empty) returns (GetFriendsResponse);
    // Get info about friend
    rpc GetFriendInfo(GetFriendInfoRequest) returns (GetFriendInfoResponse);
}

message AddFriendRequest {
    int64 friend_id = 1;
}

message DeleteFriendRequest {
    int64 friend_id = 1;
}

message GetFriendsResponse {
    repeated int64 friends_ids = 1;
}

message GetFriendInfoRequest {
    int64 friend_id = 1;
}

message GetFriendInfoResponse {
    int64 friend_id = 1;
    string email = 2;
}